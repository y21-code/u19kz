<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LIVE YOURS</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;700;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0a0a0a;
    overflow:hidden;
    font-family:'Inter', sans-serif;
}

/* Soft background glow */
.bg{
    position:absolute;
    width:700px;
    height:700px;
    background:radial-gradient(circle, rgba(255,255,255,0.08), transparent 70%);
    filter:blur(40px);
    animation:pulse 6s ease-in-out infinite;
}

@keyframes pulse{
    0%,100%{
        transform:scale(1);
        opacity:.5;
    }
    50%{
        transform:scale(1.2);
        opacity:1;
    }
}

/* Main text */
.text{
    position:relative;
    font-size:9vw;
    font-weight:900;
    letter-spacing:-6px;
    color:white;
    text-transform:uppercase;
    line-height:1;
    display:flex;
    gap:20px;
}

/* LIVE */
.live{
    position:relative;
    animation:slideLeft 1.5s ease;
}

/* YOURS */
.yours{
    position:relative;
    color:transparent;
    -webkit-text-stroke:1px rgba(255,255,255,0.7);
    animation:slideRight 1.5s ease;
}

/* Animated gradient line */
.line{
    position:absolute;
    bottom:-25px;
    left:0;
    width:100%;
    height:2px;
    overflow:hidden;
}

.line::before{
    content:'';
    position:absolute;
    width:40%;
    height:100%;
    background:linear-gradient(90deg, transparent, white, transparent);
    animation:moveLine 3s linear infinite;
}

@keyframes moveLine{
    0%{
        transform:translateX(-150%);
    }
    100%{
        transform:translateX(350%);
    }
}

/* Animations */
@keyframes slideLeft{
    from{
        opacity:0;
        transform:translateX(-80px);
    }
    to{
        opacity:1;
        transform:translateX(0);
    }
}

@keyframes slideRight{
    from{
        opacity:0;
        transform:translateX(80px);
    }
    to{
        opacity:1;
        transform:translateX(0);
    }
}

/* Floating particles */
.particles span{
    position:absolute;
    width:4px;
    height:4px;
    background:white;
    border-radius:50%;
    opacity:.2;
    animation:float 10s linear infinite;
}

.particles span:nth-child(1){ left:10%; animation-delay:0s; }
.particles span:nth-child(2){ left:25%; animation-delay:2s; }
.particles span:nth-child(3){ left:40%; animation-delay:4s; }
.particles span:nth-child(4){ left:60%; animation-delay:1s; }
.particles span:nth-child(5){ left:80%; animation-delay:3s; }

@keyframes float{
    from{
        transform:translateY(100vh) scale(0);
    }
    to{
        transform:translateY(-10vh) scale(1.5);
    }
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="particles">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
</div>

<div class="text">
    <div class="live">LIVE</div>
    <div class="yours">YOURS</div>

    <div class="line"></div>
</div>

</body>
</html>
